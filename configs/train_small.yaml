# =============================================================================
# CDW-Seg  —  COCO training configuration
# Model: SAM2.1 hiera-Small
# =============================================================================
# Ported from sam2.1_hiera_s.yaml (Hydra format) → train.yaml format
# Key differences vs hiera-Large:
#   embed_dim        : 144 → 96
#   depth            : 32  → 16   (stages 2+6+36+4=48 → 1+2+11+2=16)
#   num_heads        : 2   → 1
#   backbone_channels: [1152,576,288,144] → [768,384,192,96]
#   global_attn_idxs : [7,15,23,31] → [7,10,13]
# =============================================================================

# -----------------------------------------------------------------------------
# Class definitions  (order = contiguous index; index 0 = background)
# -----------------------------------------------------------------------------
classes:
  - background            # 0  — always first; ignored in loss when ignore_bg: true
  - bin                   # 1
  - concrete_bricks_tiles # 2
  - soils                 # 3
  - green_waste_timber    # 4
  - plastic               # 5
  - metals_e_waste        # 6
  - non_recyclable_waste  # 7
  - cardboard             # 8
  - plaster_board         # 9
  # Uncomment when fine-tune labelled data is available:
  # - paint_can           # 10
  # - needles_syringes    # 11
  # - dead_animal         # 12

ignore_bg: false

# -----------------------------------------------------------------------------
# Step 1 — Dataset preparation  (python train.py --prepare-only)
# -----------------------------------------------------------------------------
split_preparation:
  source_dir:           cdw_coco
  source_images_subdir: images
  source_ann_file:      annotations.json
  train_ratio: 0.80
  val_ratio:   0.10
  test_ratio:  0.10
  split_seed:  42

# -----------------------------------------------------------------------------
# Step 2 — COCO dataset root  (produced by Step 1)
# -----------------------------------------------------------------------------
coco:
  coco_root: cdw_coco
  # ann_file is inferred as  annotations/instances_<split>.json

# -----------------------------------------------------------------------------
# Input / augmentation
# -------------------------`----------------------------------------------------
inp_size:   512
augment:    true

# -----------------------------------------------------------------------------
# DataLoader
# -----------------------------------------------------------------------------
batch_size:  1
num_workers: 0

# Gradient accumulation
accum_steps: 16
grad_checkpoint: true

# -----------------------------------------------------------------------------
# Model  —  SAM2.1 hiera-Small
# -----------------------------------------------------------------------------
sam_checkpoint: pretrained/sam2.1_hiera_large.pt

model:
  name: sam
  args:
    # num_classes is injected automatically — do not set manually
    inp_size: 512
    loss: iou
    encoder_mode:
      name: sam
      # ── Hiera-Small trunk (from sam2.1_hiera_s.yaml) ──────────────────────
      stages: [1, 2, 11, 2]                  # total depth = 16  (vs Large: [2,6,36,4]=48)
      global_att_blocks: [7, 10, 13]         # global attention block indices
      window_pos_embed_bkg_spatial_size: [7, 7]
      window_spec: [8, 4, 14, 7]             # window sizes per stage

      # ── FPN Neck ──────────────────────────────────────────────────────────
      num_pos_feats: 256
      normalize: true
      scale: null
      temperature: 10000
      d_model: 256
      backbone_channel_list: [768, 384, 192, 96]   # vs Large: [1152, 576, 288, 144]
      fpn_top_down_levels: [2, 3]
      fpn_interp_model: nearest

      # ── Encoder / ViT core ────────────────────────────────────────────────
      img_size: 256
      mlp_ratio: 4
      patch_size: 16
      qkv_bias: true
      use_rel_pos: true
      window_size: 14
      out_chans: 256
      scale_factor: 32

      # ── CDW-Seg adapter settings (keep identical to Large config) ─────────
      input_type: fft
      freq_nums: 0.1
      prompt_type: highpass
      prompt_embed_dim: 256
      tuning_stage: 1234
      handcrafted_tune: true
      embedding_tune: true
      adaptor: adaptor

      # ── Hiera-Small backbone dims ─────────────────────────────────────────
      embed_dim: 96                          # vs Large: 144
      depth: 16                              # sum(stages) = 1+2+11+2
      num_heads: 1                           # vs Large: 2
      global_attn_indexes: [7, 10, 13]      # mirrors global_att_blocks

# -----------------------------------------------------------------------------
# Optimisation
# -----------------------------------------------------------------------------
optimizer:
  name: adamw
  args:
    lr: 0.0002
    weight_decay: 0.01

lr_min:        1.0e-7
freeze_encoder: true

# Mixed precision  (set false on CPU)
use_amp: true

# -----------------------------------------------------------------------------
# Training loop
# -----------------------------------------------------------------------------
epoch_max:  5
epoch_val:  1
epoch_save: 2

early_stopping:
  patience:  20
  min_delta: 0.001

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
eval_type: seg

data_norm:
  inp:
    sub: [0.5]
    div: [0.5]
  gt:
    sub: [0.5]
    div: [0.5]